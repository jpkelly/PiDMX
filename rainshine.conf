[shader]
speed = 25.0
trail = 25
density = 0.5

[output]
fps = 60.0
universe = 1
# Color order to match your LED hardware (rgb, grb, bgr, etc.)
color_order = grb
# Overall brightness (0.0 – 1.0)
brightness = 1.0
# sACN destination IP (your pixel controller)
sacn_dest = 10.0.0.123

[osc]
port = 7700

[sensor]
# Set enabled = true once the STHS34PF80 sensor is wired up (I2C)
enabled = true
# Seconds to stay active after last detection
trigger_hold = 10.0
# Minimum raw values required to count as a trigger
# Set to 0.0 to disable threshold filtering.
presence_threshold = 20.0
motion_threshold = 15.0
# Number of consecutive trigger hits required before activation
trigger_hits = 1
motion_brightness_base = 0.05
motion_brightness_full = 150.0
